<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Vasco Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="header">
            <div class="links">
                <a href="https://www.youtube.com/@gustavomeco" rel="noreferrer noopener">gustavomeco</a>
                <a href="https://github.com/gustavomeco/Project-Calculator" rel="noreferrer noopener">github</a>
            </div>
        </div>
        <div id="title">
                <span style="margin-right: 10px;">gustavomeco</span>
                <img src="img/2258_imgbank_1683640645.png" alt="vasco da gama" height="32px" width="32px"> 
                <span style="margin-left: 10px;">calculator :0</span>
            </div>
        <div class="container">
            <div class="calculator">
                    <div id="results">
                    </div>
                    <div class="buttons">
                        <div class="numbers">
                            <button>7</button>
                            <button>8</button>
                            <button>9</button>
                            <button>4</button>
                            <button>5</button>
                            <button>6</button>
                            <button>1</button>
                            <button>2</button>
                            <button>3</button>
                            <button>0</button>
                            <button id="point">.</button>
                            <button>=</button>
                        </div>
                        <div class="operators">
                            <button>+</button>
                            <button>-</button>
                            <button>x</button>
                            <button>/</button>
                        </div>
                        <button id="cancel">CE</button>
                    </div>
            </div>
        </div>


    </body>

</html>
