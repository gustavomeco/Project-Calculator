<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Retro Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script src="js-file.js" defer></script>
    </head>
    <body>
        <div class="container">
                <div id="results">
                </div>
                <div class="buttons">
                    <div class="numbers">
                        <button>7</button>
                        <button>8</button>
                        <button>9</button>
                        <button>4</button>
                        <button>5</button>
                        <button>6</button>
                        <button>1</button>
                        <button>2</button>
                        <button>3</button>
                        <button>0</button>
                        <button>.</button>
                        <button>=</button>
                    </div>
                    <div class="operators">
                        <button>+</button>
                        <button>-</button>
                        <button>x</button>
                        <button>/</button>
                    </div>
                    <button id="cancel">CE</button>
                </div>
        </div>


    </body>

</html>
